<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Parivartan Impact Dashboard</title>
<style>
  :root {
    --brand-ink: #0F1830;
    --brand-ink-2: #1A2547;
    --brand-accent: #C9A648;            /* warm gold — accent on dark header */
    --primary: #1D3461;                 /* deep institutional indigo (replaces brand red as the "active" signal) */
    --primary-soft: #E8ECF6;
    --secondary: #003087;               /* deep navy — used in chart accents */

    --page-bg: #F7F8FC;
    --surface: #FFFFFF;
    --ink-1: #1A1A2E;
    --ink-2: #4A5168;
    --ink-3: #6B7280;
    --divider: #E5E7EB;
    --tint: #EEF1FB;

    /* Score bands — verbatim from brief */
    --excellent-fill: #C8E6C9;  --excellent-text: #1B5E20;
    --good-fill: #DCEDC8;       --good-text: #33691E;
    --moderate-fill: #FFE0B2;   --moderate-text: #E65100;
    --poor-fill: #FFCDD2;       --poor-text: #B71C1C;

    /* OECD criterion accents */
    --c-relevance: #1976D2;
    --c-coherence: #7B1FA2;
    --c-efficiency: #00897B;
    --c-effectiveness: #2E7D32;
    --c-impact: #E65100;
    --c-sustainability: #558B2F;
    --c-branding: #6D4C41;

    /* Thematic Tool accents */
    --t-NRM: #1F3A93;
    --t-HH: #0E8388;
    --t-SDLE: #C9711F;
    --t-PoE: #6B3FA0;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: #0a0d18;
    font-family: "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
    color: var(--ink-1);
    overflow: hidden;
  }
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #0a0d18;
  }
  #canvas {
    width: 1280px; height: 720px;
    background: var(--page-bg);
    position: relative;
    transform-origin: center center;
    box-shadow: 0 30px 80px rgba(0,0,0,0.45);
    overflow: hidden;
  }

  /* Header — slim, since vnav holds brand */
  .header {
    height: 56px; width: 100%;
    background: #fff;
    border-bottom: 1px solid var(--divider);
    display: flex; align-items: center;
    padding: 0 20px;
    color: var(--ink-1);
    gap: 18px;
    position: relative;
    flex-shrink: 0;
  }
  .logo-slot {
    display: flex; align-items: center; gap: 12px;
    padding-right: 20px; border-right: 1px solid rgba(255,255,255,0.16);
    height: 36px;
  }
  .logo-mark {
    width: 36px; height: 36px; border-radius: 6px;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    color: var(--brand-ink); font-weight: 700; font-size: 13px;
    letter-spacing: 0.02em;
  }
  .logo-text {
    line-height: 1.1;
    font-size: 11px; letter-spacing: 0.14em; color: rgba(255,255,255,0.7);
  }
  .logo-text strong {
    display: block; font-size: 13px; letter-spacing: 0.18em; color: #fff;
    font-weight: 600;
  }
  .title-block {
    display: flex; flex-direction: column; line-height: 1.15;
  }
  .title-block .eyebrow {
    font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.6); font-weight: 600;
  }
  .title-block h1 {
    margin: 2px 0 0; font-size: 18px; font-weight: 600; letter-spacing: 0.01em;
  }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .meta-chip {
    height: 28px; padding: 0 10px; border-radius: 4px;
    background: #F4F6FB;
    border: 1px solid var(--divider);
    color: var(--ink-1); font-size: 10.5px; display: flex; align-items: center; gap: 7px;
  }
  .meta-chip .lbl { color: var(--ink-3); }
  .meta-chip .val { font-weight: 600; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #16a34a; box-shadow: 0 0 0 3px rgba(22,163,74,0.18); }

  /* Page title in header */
  .page-title {
    display: flex; flex-direction: column; line-height: 1.1;
  }
  .page-title .crumb {
    font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-3); font-weight: 600;
  }
  .page-title h1 {
    margin: 2px 0 0; font-size: 16px; font-weight: 600; color: var(--ink-1); letter-spacing: 0.01em;
  }

  /* Vertical left nav */
  .vnav {
    width: 168px;
    height: 100%;
    background: var(--brand-ink);
    color: #fff;
    display: flex; flex-direction: column;
    padding: 14px 0 10px;
    position: relative;
    flex-shrink: 0;
  }
  .vnav::after {
    content: "";
    position: absolute; right: 0; top: 0; bottom: 0; width: 1px;
    background: rgba(255,255,255,0.06);
  }
  .vnav-brand {
    display: flex; align-items: center; gap: 9px;
    padding: 0 14px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .vnav-brand .logo-mark {
    width: 30px; height: 30px; border-radius: 5px;
    background: var(--brand-accent);
    display: flex; align-items: center; justify-content: center;
    color: var(--brand-ink); font-weight: 700; font-size: 13px;
  }
  .vnav-brand .txt { line-height: 1.05; }
  .vnav-brand .txt strong {
    display: block; font-size: 11.5px; font-weight: 700; letter-spacing: 0.16em; color: #fff;
  }
  .vnav-brand .txt span {
    display: block; font-size: 8.5px; letter-spacing: 0.14em; color: rgba(255,255,255,0.55);
    margin-top: 2px;
  }
  .vnav-section {
    padding: 12px 12px 4px;
    font-size: 8.5px; font-weight: 700; letter-spacing: 0.12em;
    color: rgba(255,255,255,0.4); text-transform: uppercase;
  }
  .vnav-items { display: flex; flex-direction: column; padding: 0 8px; gap: 1px; }
  .vnav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 5px;
    font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.78);
    cursor: pointer; user-select: none;
    position: relative;
    transition: background 120ms ease, color 120ms ease;
  }
  .vnav-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
  .vnav-item.active {
    background: rgba(255,255,255,0.08);
    color: #fff; font-weight: 600;
  }
  .vnav-item.active::before {
    content: "";
    position: absolute; left: -8px; top: 6px; bottom: 6px; width: 3px;
    background: var(--brand-accent); border-radius: 0 2px 2px 0;
  }
  .vnav-item .num {
    width: 20px; height: 20px; border-radius: 4px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; letter-spacing: 0.02em;
    background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.78);
    flex-shrink: 0;
  }
  .vnav-item.active .num { background: var(--brand-accent); color: var(--brand-ink); }
  .vnav-foot {
    margin-top: auto;
    padding: 10px 14px 4px;
    font-size: 8.5px; color: rgba(255,255,255,0.4);
    line-height: 1.4; letter-spacing: 0.04em;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .vnav-foot strong { color: rgba(255,255,255,0.7); display: block; margin-bottom: 2px; font-size: 9.5px; letter-spacing: 0.08em; }

  /* Body — vnav + right column */
  .body-row {
    display: flex; align-items: stretch;
    width: 100%; height: 100%;
  }
  .main-col {
    flex: 1; min-width: 0;
    display: flex; flex-direction: column;
    height: 100%;
  }

  /* Filter bar */
  .filterbar {
    height: 40px; width: 100%;
    background: #fff;
    border-bottom: 1px solid var(--divider);
    display: flex; align-items: center;
    padding: 0 16px; gap: 8px;
    font-size: 11px;
  }
  .filter-label { color: var(--ink-3); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; font-size: 10px; margin-right: 4px; }
  .slicer {
    display: flex; align-items: center; gap: 6px;
    height: 26px; padding: 0 10px;
    border: 1px solid var(--divider); border-radius: 4px;
    background: #fff; cursor: pointer;
    font-size: 11px; color: var(--ink-1);
    white-space: nowrap;
    transition: border-color 120ms ease, background 120ms ease;
  }
  .slicer:hover { border-color: #C9D0DF; background: #FAFBFE; }
  .slicer .k { color: var(--ink-3); font-size: 10px; letter-spacing: 0.04em; }
  .slicer .v { font-weight: 600; }
  .slicer .caret { color: var(--ink-3); font-size: 9px; margin-left: 2px; }
  .slicer.active { border-color: var(--primary); background: var(--primary-soft); }

  /* Dropdown */
  .slicer-wrap { position: relative; }
  .dropdown {
    position: absolute; top: 30px; left: 0;
    min-width: 170px; max-height: 232px;
    background: #fff; border: 1px solid #C9D0DF;
    border-radius: 5px;
    box-shadow: 0 12px 28px rgba(15,24,48,0.18), 0 2px 6px rgba(15,24,48,0.08);
    z-index: 200;
    padding: 4px;
    font-size: 11px;
    display: flex; flex-direction: column;
  }
  .dd-scroll { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #CFD5E2 transparent; }
  .dd-scroll::-webkit-scrollbar { width: 6px; }
  .dd-scroll::-webkit-scrollbar-thumb { background: #CFD5E2; border-radius: 3px; }
  .dd-opt {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 8px; border-radius: 3px; cursor: pointer;
    color: var(--ink-1);
    white-space: nowrap;
    user-select: none;
  }
  .dd-opt:hover { background: var(--tint); }
  .dd-opt.selected { background: var(--primary-soft); color: var(--primary); font-weight: 600; }
  .dd-opt .check {
    width: 13px; height: 13px;
    border: 1.5px solid #C9D0DF; border-radius: 3px;
    display: inline-flex; align-items: center; justify-content: center;
    color: #fff; font-size: 10px; font-weight: 700;
    background: #fff; flex-shrink: 0;
  }
  .dd-opt.selected .check { background: var(--primary); border-color: var(--primary); }
  .dd-opt.radio .check { border-radius: 50%; }
  .dd-divider { height: 1px; background: var(--divider); margin: 4px 2px; }
  .dd-header {
    padding: 4px 8px 6px;
    font-size: 9.5px; font-weight: 700; letter-spacing: 0.06em;
    color: var(--ink-3); text-transform: uppercase;
    border-bottom: 1px solid var(--divider);
    margin-bottom: 3px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .dd-link { font-size: 10px; color: var(--primary); cursor: pointer; font-weight: 600; text-transform: none; letter-spacing: 0; }
  .dd-link:hover { text-decoration: underline; }
  .reset-btn {
    margin-left: auto;
    height: 26px; padding: 0 12px;
    border: 1px solid var(--primary); color: var(--primary); background: #fff;
    border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    white-space: nowrap;
    transition: background 120ms ease, color 120ms ease;
  }
  .reset-btn:hover { background: var(--primary); color: #fff; }
  .filter-count { font-size: 11px; color: var(--ink-3); font-weight: 500; }

  /* Content area */
  .content {
    flex: 1; min-height: 0;
    padding: 12px;
    position: relative;
    overflow: hidden;
  }
  .content-inner { height: 100%; width: 100%; display: flex; flex-direction: column; gap: 10px; }

  /* Generic primitives */
  .card {
    background: var(--surface);
    border: 1px solid var(--divider);
    border-radius: 6px;
    padding: 12px 14px;
    position: relative;
    overflow: hidden;
  }
  .card h3 {
    margin: 0; padding: 0;
    font-size: 13px; font-weight: 600; color: var(--ink-1); letter-spacing: 0.01em;
  }
  .card .sub {
    margin-top: 2px;
    font-size: 10.5px; color: var(--ink-3);
  }
  .card-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 8px;
  }
  .card-header .right { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--ink-3); }

  .row { display: flex; gap: 10px; }
  .col { display: flex; flex-direction: column; gap: 10px; }

  /* KPI card */
  .kpi {
    background: #fff;
    border: 1px solid var(--divider);
    border-radius: 6px;
    padding: 8px 12px;
    position: relative;
    flex: 1;
    min-width: 0;
    overflow: hidden;
  }
  .kpi .lbl { font-size: 9.5px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; }
  .kpi .val { font-size: 22px; font-weight: 600; color: var(--ink-1); line-height: 1.1; margin-top: 3px; letter-spacing: -0.01em; }
  .kpi .delta { font-size: 9.5px; color: var(--ink-3); margin-top: 3px; display: flex; align-items: center; gap: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .kpi .delta .up { color: #16a34a; font-weight: 600; }
  .kpi .delta .dn { color: #dc2626; font-weight: 600; }
  .kpi .accent-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--primary); }

  /* Band tag */
  .band {
    display: inline-flex; align-items: center; gap: 4px;
    height: 18px; padding: 0 8px; border-radius: 9px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.02em;
  }
  .band.excellent { background: var(--excellent-fill); color: var(--excellent-text); }
  .band.good { background: var(--good-fill); color: var(--good-text); }
  .band.moderate { background: var(--moderate-fill); color: var(--moderate-text); }
  .band.poor { background: var(--poor-fill); color: var(--poor-text); }

  /* Score cell */
  .scell {
    display: inline-flex; flex-direction: column; align-items: center; justify-content: center;
    min-width: 36px; padding: 3px 6px; border-radius: 4px;
    font-size: 11.5px; font-weight: 600;
    line-height: 1.1;
  }
  .scell .n { font-size: 8px; font-weight: 500; margin-top: 1px; opacity: 0.75; }
  .scell.excellent { background: var(--excellent-fill); color: var(--excellent-text); }
  .scell.good { background: var(--good-fill); color: var(--good-text); }
  .scell.moderate { background: var(--moderate-fill); color: var(--moderate-text); }
  .scell.poor { background: var(--poor-fill); color: var(--poor-text); }
  .scell.na { background: #F3F4F6; color: #9CA3AF; }

  /* Tables */
  table.matrix {
    width: 100%; border-collapse: collapse;
    font-size: 11px;
  }
  table.matrix th, table.matrix td {
    padding: 5px 6px;
    text-align: left;
    border-bottom: 1px solid var(--divider);
    vertical-align: middle;
  }
  table.matrix th {
    font-size: 9.5px; font-weight: 600; color: var(--ink-3);
    text-transform: uppercase; letter-spacing: 0.07em;
    background: #FAFBFE; position: sticky; top: 0; z-index: 1;
  }
  table.matrix td.num, table.matrix th.num { text-align: center; }
  table.matrix tr.group-header td {
    background: var(--tint);
    font-size: 11px; font-weight: 700; color: var(--ink-1);
    padding-top: 7px; padding-bottom: 7px;
    letter-spacing: 0.02em;
  }
  table.matrix tr.subtotal td {
    background: #F8FAFC;
    font-weight: 600;
    color: var(--ink-1);
  }
  table.matrix tr.grand td {
    background: var(--brand-ink);
    color: #fff;
    font-weight: 700;
    font-size: 12px;
  }
  table.matrix tr.grand td .scell { font-size: 13px; }
  .scroll {
    overflow-y: auto; overflow-x: hidden;
    scrollbar-width: thin; scrollbar-color: #CFD5E2 transparent;
  }
  .scroll::-webkit-scrollbar { width: 6px; }
  .scroll::-webkit-scrollbar-thumb { background: #CFD5E2; border-radius: 3px; }

  /* Score bars */
  .bar-track {
    position: relative; height: 8px; border-radius: 4px;
    background: #F1F3F8; overflow: hidden;
  }
  .bar-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    border-radius: 4px;
  }

  /* Legend strip */
  .legend {
    display: flex; align-items: center; gap: 14px;
    font-size: 10.5px; color: var(--ink-2);
  }
  .legend .item { display: flex; align-items: center; gap: 6px; }
  .legend .swatch { width: 14px; height: 12px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.06); }

  /* Sub-tab strip (Tab 5) */
  .subtabs {
    display: flex; align-items: stretch; gap: 4px;
    background: transparent;
    margin-bottom: 8px;
  }
  .subtab {
    padding: 0 14px; height: 30px;
    display: flex; align-items: center; gap: 6px;
    font-size: 11.5px; color: var(--ink-2); font-weight: 500;
    background: #fff; border: 1px solid var(--divider); border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 120ms ease;
  }
  .subtab:hover { border-color: #C9D0DF; }
  .subtab.active {
    background: var(--brand-ink); color: #fff; border-color: var(--brand-ink);
    font-weight: 600;
  }
  .subtab.active .num { background: rgba(255,255,255,0.18); color: #fff; }
  .subtab .num {
    width: 16px; height: 16px; border-radius: 3px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; background: var(--tint); color: var(--primary);
  }

  /* Tool tag */
  .tool-tag {
    display: inline-flex; align-items: center; gap: 4px;
    height: 16px; padding: 0 6px; border-radius: 3px;
    font-size: 9px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .tool-tag.NRM { background: rgba(31,58,147,0.10); color: var(--t-NRM); }
  .tool-tag.HH { background: rgba(14,131,136,0.10); color: var(--t-HH); }
  .tool-tag.SDLE { background: rgba(201,113,31,0.12); color: var(--t-SDLE); }
  .tool-tag.PoE { background: rgba(107,63,160,0.10); color: var(--t-PoE); }

  /* Footer */
  .canvas-foot {
    height: 20px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    font-size: 9.5px; color: var(--ink-3);
    background: #fff; border-top: 1px solid var(--divider);
    letter-spacing: 0.04em;
  }
  .canvas-foot .left { display: flex; align-items: center; gap: 12px; }
  .canvas-foot .right { display: flex; align-items: center; gap: 12px; }

  /* Adjust content height to leave room for footer */

  /* Hover affordance */
  .row-hint { font-size: 9.5px; color: var(--ink-3); }

  /* Disabled-looking dim */
  .dim { opacity: 0.55; }

  /* Scoped utilities */
  .mono { font-variant-numeric: tabular-nums; font-feature-settings: "tnum"; }
  .right { text-align: right; }
  .center { text-align: center; }
  .grow { flex: 1; min-width: 0; }
  .pill {
    display: inline-flex; align-items: center; height: 16px; padding: 0 6px;
    border-radius: 8px; font-size: 9.5px; font-weight: 600; letter-spacing: 0.02em;
  }

  /* Map */
  .map-wrap { position: relative; width: 100%; height: 100%; }
  .map-state {
    cursor: pointer;
    transition: filter 120ms ease, stroke 120ms ease;
    stroke: #fff; stroke-width: 1.2;
  }
  .map-state:hover { filter: brightness(0.92); stroke: var(--ink-1); stroke-width: 1.6; }
  .map-label { font-size: 9px; font-weight: 700; fill: #fff; pointer-events: none; }
  .map-label-score { font-size: 8.5px; font-weight: 600; fill: #fff; pointer-events: none; }

  /* Gauges */
  .gauge { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .gauge svg { display: block; }
  .gauge .lbl { font-size: 9px; color: var(--ink-2); font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; line-height: 1; }
  .gauge .band { height: 13px; padding: 0 5px; font-size: 8px; }

  /* Tooltips disabled - use direct labelling */
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<template id="__bundler_thumbnail" data-bg-color="#0F1830">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#0F1830"/>
    <!-- Dashboard silhouette -->
    <rect x="120" y="160" width="960" height="60" rx="6" fill="#1A2547"/>
    <rect x="140" y="178" width="180" height="24" rx="3" fill="#C9A648"/>
    <rect x="340" y="178" width="320" height="24" rx="3" fill="#2A3760"/>
    <!-- Tab strip -->
    <rect x="120" y="240" width="960" height="44" rx="4" fill="#F7F8FC"/>

const DEFAULT_FILTERS = {
  states: [],
  fy: "FY 2025–26",
  themes: [],
  interventions: [],
  codes: [],
  partners: [],
};

const FilterCtx = React.createContext(null);

function FilterProvider({ children }) {
  const [filters, setFilters] = useState(DEFAULT_FILTERS);

  const toggle = (key, value) => {
    setFilters(f => {
      const arr = f[key];
      if (Array.isArray(arr)) {
        const next = arr.includes(value) ? arr.filter(x => x !== value) : [...arr, value];
        return { ...f, [key]: next };
      }
      return { ...f, [key]: value };
    });
  };
  const setSingle = (key, value) => setFilters(f => ({ ...f, [key]: value }));
  const clear = (key) => setFilters(f => ({ ...f, [key]: [] }));
  const reset = () => setFilters(DEFAULT_FILTERS);

  // Filter projects by state, code, partner; theme/intervention used for dimming + Tab5C
  const filteredProjects = PROJECTS.filter(p =>
    (filters.states.length === 0 || filters.states.includes(p.state)) &&
    (filters.codes.length === 0 || filters.codes.includes(p.code)) &&
    (filters.partners.length === 0 || filters.partners.includes(p.partner))
  );
  const filteredInterventions = INTERVENTIONS.filter(it =>
    (filters.themes.length === 0 || filters.themes.includes(it.tool)) &&
    (filters.interventions.length === 0 || filters.interventions.includes(it.name))
  );

  const isActiveTool  = (t) => filters.themes.length === 0 || filters.themes.includes(t);
  const isActiveState = (s) => filters.states.length === 0 || filters.states.includes(s);
  const isActiveCode  = (c) => filters.codes.length === 0 || filters.codes.includes(c);

  const activeCount = (filters.states.length ? 1 : 0) + (filters.themes.length ? 1 : 0)
    + (filters.interventions.length ? 1 : 0) + (filters.codes.length ? 1 : 0)
    + (filters.partners.length ? 1 : 0)
    + (filters.fy !== DEFAULT_FILTERS.fy ? 1 : 0);

  return (
    <FilterCtx.Provider value={{
      filters, toggle, setSingle, clear, reset,
      filteredProjects, filteredInterventions,
      isActiveTool, isActiveState, isActiveCode,
      activeCount,
    }}>
      {children}
    </FilterCtx.Provider>
  );
}
const useFilters = () => React.useContext(FilterCtx);

function ScoreCell({ s, n, na, big, style }) {
  if (na || s == null) return <div className="scell na" style={style}>—</div>;

    <div className={`scell ${b}`} style={{ minWidth: big ? 46 : 36, padding: big ? "4px 8px" : "3px 6px", ...style }}>
      <span className="mono" style={{ fontSize: big ? 12.5 : 11.5 }}>{s.toFixed(1)}</span>
      {n != null && <span className="n mono">n={n}</span>}
    </div>
  );
}

function BandTag({ s, label }) {
  const b = bandOf(s);
  return <span className={`band ${b}`}>{label || BANDS[b].label}</span>;
}

function Bar({ value, max=5, color, width="100%", height=10, label }) {
  const pct = Math.max(0, Math.min(1, value/max)) * 100;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, width }}>
      <div style={{ flex: 1, position: "relative", height, background: "#F1F3F8", borderRadius: 4, overflow: "hidden" }}>
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${pct}%`, background: color, borderRadius: 4 }} />
      </div>
      {label && <span className="mono" style={{ fontSize: 11, fontWeight: 600, color: "#1A1A2E", minWidth: 26, textAlign: "right" }}>{label}</span>}
    </div>
  );
}

function ScoreBar({ value, max=5, label, height=12 }) {
  const c = bandColor(value);

        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: `${pct}%`, borderRight: `2px solid ${c.text}`, opacity: 0.55, borderRadius: 4 }} />

      {label != null && <span className="mono" style={{ fontSize: 11, fontWeight: 700, color: c.text, minWidth: 28, textAlign: "right" }}>{label}</span>}
    </div>
  );
}

function KPI({ label, value, unit, sub, accent, trend }) {
  return (
    <div className="kpi">

function Slicer({ label, display, active, options, selected, multi, radio, onToggle, onClear }) {
  const [open, setOpen] = useState(false);
  const wrap = useRef(null);

  useEffect(() => {
    if (!open) return;
    const handle = (e) => {
      if (wrap.current && !wrap.current.contains(e.target)) setOpen(false);
    };
    document.addEventListener("mousedown", handle);
    return () => document.removeEventListener("mousedown", handle);
  }, [open]);

  const isSel = (opt) => multi ? selected.includes(opt) : selected === opt;

  return (
    <div className="slicer-wrap" ref={wrap}>
      <div className={`slicer ${active || open ? "active" : ""}`}
           onClick={() => setOpen(o => !o)}>
        <span className="k">{label}</span>
        <span className="v">{display}</span>
        <span className="caret">{open ? "▴" : "▾"}</span>
      </div>
      {open && (
        <div className="dropdown">
          <div className="dd-header">
            <span>{label}{multi ? ` · ${selected.length}/${options.length}` : ""}</span>
            {multi && selected.length > 0 && (
              <span className="dd-link" onClick={(e) => { e.stopPropagation(); onClear(); }}>Clear</span>
            )}
          </div>
          <div className="dd-scroll">
            {multi && (
              <div className={`dd-opt ${selected.length === 0 ? "selected" : ""}`}
                   onClick={() => onClear()}>
                <span className="check">{selected.length === 0 ? "✓" : ""}</span>
                <span>All {label.toLowerCase()}s</span>
              </div>
            )}
            {options.map(opt => {
              const sel = isSel(opt);
              return (
                <div key={opt}
                     className={`dd-opt ${radio ? "radio" : ""} ${sel ? "selected" : ""}`}
                     onClick={() => { onToggle(opt); if (radio) setOpen(false); }}>
                  <span className="check">{sel ? (radio ? "●" : "✓") : ""}</span>
                  <span>{opt}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

function Tab1() {
  const f = useFilters();
  const fp = f.filteredProjects;
  const avg = fp.length ? (fp.reduce((s,p)=>s+p.score,0)/fp.length) : 0;
  const hrdpCount = fp.filter(p => p.type === "HRDP").length;
  const fdpCount = fp.filter(p => p.type === "FDP").length;
  const totalBudget = fp.reduce((s,p)=>s+p.budget,0);
  const avgBudget = fp.length ? totalBudget / fp.length : 0;

  const kpis = [
    { label: "Total Projects",     value: String(fp.length), sub: fp.length === PROJECTS.length ? "Active across portfolio" : `Filtered from ${PROJECTS.length}`, accent: "var(--primary)" },
    { label: "HRDP Projects",      value: String(hrdpCount), sub: "Multi-theme integrated",      accent: "#0E8388" },
    { label: "FDP Projects",       value: String(fdpCount),  sub: "Single-theme focused",        accent: "#C9711F" },
    { label: "Total Budget",       value: `₹${totalBudget.toFixed(1)}`, unit: "Cr",  sub: `FY 2025–26 · ${fp.length} project${fp.length===1?"":"s"}`, accent: "var(--secondary)" },
    { label: "Budget / Project",   value: `₹${avgBudget.toFixed(2)}`, unit: "Cr", sub: fp.length ? `Median ₹${[...fp].sort((a,b)=>a.budget-b.budget)[Math.floor(fp.length/2)].budget.toFixed(2)} Cr` : "—", accent: "#6D4C41" },
  ];

  // Compute filtered tool averages only when projects are filtered;
  // at the unfiltered baseline use the briefed programme-level tool scores verbatim.
  const baseTool = { PoE: 3.28, "H&H": 3.45, SDLE: 3.71, NRM: 3.82 };
  const filteredToolAvg = (toolKey) => {
    if (fp.length === PROJECTS.length) return baseTool[toolKey];
    const idx = { PoE: 0, "H&H": 1, SDLE: 2, NRM: 3 }[toolKey];
    if (fp.length === 0) return 0;
    const vals = fp.map(p => STATE_TOOL[p.state]?.v[idx]).filter(v => v != null);
    return vals.length ? vals.reduce((a,b)=>a+b,0) / vals.length : 0;
  };

  const tools = [
    { tool: "NRM",   score: filteredToolAvg("NRM")  },
    { tool: "H&H",   score: filteredToolAvg("H&H")  },
    { tool: "SDLE",  score: filteredToolAvg("SDLE") },
    { tool: "PoE",   score: filteredToolAvg("PoE")  },
    { tool: "Overall", score: fp.length === PROJECTS.length ? 3.56 : avg },
  ];

  // Budget range breakdown: 1–3 Cr / 3–5 Cr / 5–15 Cr with avg score
  const ranges = [
    { label: "₹1 – 3 Cr",  min: 1, max: 3 },
    { label: "₹3 – 5 Cr",  min: 3, max: 5 },
    { label: "₹5 – 15 Cr", min: 5, max: 15 },
  ].map(r => {
    const items = fp.filter(p => p.budget >= r.min && p.budget < r.max);
    const a = items.length ? items.reduce((s,p)=>s+p.score,0)/items.length : 0;
    return { ...r, count: items.length, avg: a, budgetSum: items.reduce((s,p)=>s+p.budget,0) };
  });
  const maxRangeCount = Math.max(1, ...ranges.map(r=>r.count));

  // % projects by performance category per region (zone)
  const zoneOrder = ["Central India","South","West","East","North 1","North 2","North East","Pan India"];
  const regionCats = zoneOrder
    .map(z => {
      const items = fp.filter(p => p.zone === z);
      if (items.length === 0) return null;
      const e = items.filter(p => bandOf(p.score) === "excellent").length;
      const g = items.filter(p => bandOf(p.score) === "good").length;
      const m = items.filter(p => bandOf(p.score) === "moderate").length;
      const po = items.filter(p => bandOf(p.score) === "poor").length;
      return { zone: z, total: items.length, e, g, m, po };
    })
    .filter(Boolean);

  return (
    <div className="content-inner">
      {/* Row 1 — KPI cards (6 cards) */}
      <div className="row" style={{ height: 68 }}>
        {kpis.map((k, i) => (
          <KPI key={i} label={k.label} value={k.value} unit={k.unit} sub={k.sub} accent={k.accent} />
        ))}
      </div>

      {/* Row 2 — Score tiles */}
      <div className="row" style={{ height: 76 }}>
        {tools.map((t, i) => {
          const c = bandColor(t.score);
          const isOverall = t.tool === "Overall";
          const dim = !isOverall && !f.isActiveTool(t.tool);
          return (
            <div key={t.tool} className="card" style={{ flex: 1, padding: "8px 12px", borderTop: `3px solid ${isOverall ? "var(--brand-ink)" : c.text}`, opacity: dim ? 0.4 : 1, transition: "opacity 150ms ease" }}>
              <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between" }}>
                <div style={{ fontSize: 10.5, fontWeight: 700, color: "var(--ink-2)", letterSpacing: "0.04em" }}>

                <BandTag s={t.score} />
              </div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginTop: 2 }}>
                <span className="mono" style={{ fontSize: 22, fontWeight: 600, color: c.text, lineHeight: 1 }}>{t.score.toFixed(2)}</span>
                <span style={{ fontSize: 10.5, color: "var(--ink-3)" }}>/ 5.0</span>
              </div>
              <div style={{ marginTop: 5 }}>
                <ScoreBar value={t.score} height={5} />
              </div>
            </div>
          );
        })}
      </div>

      {/* Row 3 — HRDP/FDP + Budget range */}
      <div className="row" style={{ height: 158 }}>
        <div className="card" style={{ flex: 1.15, padding: "10px 12px" }}>
          <CardHead title="HRDP vs FDP — Programme Design Comparison"
            sub={`Avg score per OECD criterion · n=${hrdpCount} HRDP, n=${fdpCount} FDP`}
            right={<><span style={{ display: "inline-flex", alignItems: "center", gap: 4 }}><span style={{ width: 8, height: 8, background: "var(--secondary)" }} /> HRDP</span>
                     <span style={{ display: "inline-flex", alignItems: "center", gap: 4 }}><span style={{ width: 8, height: 8, background: "#9B2D3D" }} /> FDP</span></>} />
          <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
            {HRDP_FDP.map(r => (
              <div key={r.c} style={{ display: "grid", gridTemplateColumns: "86px 1fr 1fr", gap: 8, alignItems: "center" }}>
                <span style={{ fontSize: 10, color: "var(--ink-2)", fontWeight: 500 }}>{r.c}</span>

          </div>
        </div>

        <div className="card" style={{ flex: 0.85, padding: "10px 12px" }}>
          <CardHead title="Budget Range Breakdown"

function Gauge({ value, label }) {
  const pct = Math.max(0, Math.min(1, value/5));
  const r = 15, cx = 20, cy = 20;
  const c = bandColor(value);
  const circ = 2*Math.PI*r * 0.75;
  const filled = circ * pct;
  return (
    <div className="gauge">
      <svg width="40" height="40" viewBox="0 0 40 40">
        <circle cx={cx} cy={cy} r={r} fill="none" stroke="#EAEDF4" strokeWidth="4" strokeDasharray={`${circ} 999`} strokeLinecap="round"
                transform={`rotate(135 ${cx} ${cy})`} />
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={c.text} strokeWidth="4" strokeDasharray={`${filled} 999`} strokeLinecap="round"
                transform={`rotate(135 ${cx} ${cy})`} />
        <text x={cx} y={cy+3} textAnchor="middle" style={{ fontSize: 10.5, fontWeight: 700, fill: c.text }}>{value.toFixed(2)}</text>
      </svg>
      <div className="lbl">{label}</div>
      <BandTag s={value} />
    </div>
  );
}

function Tab5C() {
  const f = useFilters();
  const fp = f.filteredProjects;
  const fi = f.filteredInterventions;

  // Theme aggregates from interventions
  const byTool = ["NRM","H&H","SDLE","PoE"].map(t => {
    const items = INTERVENTIONS.filter(i => i.tool === t);
    const avg = items.length ? items.reduce((s,i)=>s+i.score,0)/items.length : 0;
    return { tool: t, count: items.length, avg };
  });
  byTool.sort((a,b) => b.avg - a.avg);
  const strongestTheme = byTool[0];
  const topIntervention = [...INTERVENTIONS].sort((a,b)=>b.score-a.score)[0];
  const weakestIntervention = [...INTERVENTIONS].sort((a,b)=>a.score-b.score)[0];

  // Pearson correlation: budget vs score
  const corr = (() => {
    if (fp.length < 2) return 0;
    const xs = fp.map(p => p.budget), ys = fp.map(p => p.score);
    const n = xs.length;
    const mx = xs.reduce((a,b)=>a+b,0)/n;
    const my = ys.reduce((a,b)=>a+b,0)/n;
    let num = 0, dx = 0, dy = 0;
    for (let i=0; i<n; i++) {
      num += (xs[i]-mx)*(ys[i]-my);
      dx += (xs[i]-mx)**2;
      dy += (ys[i]-my)**2;
    }
    return num / Math.sqrt(dx*dy);
  })();

  // Scatter: budget vs score
  const xMin = 1.5, xMax = 8.5, yMin = 1.5, yMax = 5.0;
  return (
    <>
      <div className="row" style={{ height: 78 }}>
        <KPI label="Total Interventions" value={String(INTERVENTIONS.length)} sub={`Across ${[...new Set(INTERVENTIONS.map(i=>i.tool))].length} thematic tools`} accent="var(--secondary)" />
        <KPI label="Top Intervention" value={topIntervention.name} sub={`${topIntervention.tool} · Score ${topIntervention.score.toFixed(2)} · ${BANDS[bandOf(topIntervention.score)].label}`} accent={BANDS.good.text} />
        <KPI label="Strongest Theme" value={strongestTheme.tool} sub={`Avg ${strongestTheme.avg.toFixed(2)} across ${strongestTheme.count} intervention${strongestTheme.count===1?"":"s"}`} accent="#0E8388" />
        <KPI label="Budget–Score Correlation" value={(corr >= 0 ? "+" : "") + corr.toFixed(2)} sub={Math.abs(corr) > 0.7 ? "Strong positive · budget tracks impact" : Math.abs(corr) > 0.4 ? "Moderate correlation" : "Weak correlation"} accent="#6D4C41" />
      </div>

      <div className="row" style={{ flex: 1, minHeight: 0 }}>
        {/* Intervention ranking */}
        <div className="card" style={{ flex: 1.1, padding: "10px 12px", display: "flex", flexDirection: "column" }}>
          <CardHead title="Intervention Performance Ranking"
            sub={`${fi.length} intervention${fi.length===1?"":"s"} ranked by score · bar colour by parent tool`}
            right={<><span style={{ display:"inline-flex", alignItems:"center", gap:4 }}><span style={{ width:8, height:8, background:"var(--t-NRM)" }} /> NRM</span>
                      <span style={{ display:"inline-flex", alignItems:"center", gap:4 }}><span style={{ width:8, height:8, background:"var(--t-HH)" }} /> H&H</span>
                      <span style={{ display:"inline-flex", alignItems:"center", gap:4 }}><span style={{ width:8, height:8, background:"var(--t-SDLE)" }} /> SDLE</span>
                      <span style={{ display:"inline-flex", alignItems:"center", gap:4 }}><span style={{ width:8, height:8, background:"var(--t-PoE)" }} /> PoE</span></>} />
          <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 4, marginTop: 2, overflow: "hidden" }}>
            {fi.map((it, i) => {
              const toolColor = { NRM: "var(--t-NRM)", "H&H": "var(--t-HH)", SDLE: "var(--t-SDLE)", PoE: "var(--t-PoE)" }[it.tool];
              const toolClass = it.tool === "H&H" ? "HH" : it.tool;
              return (
                <div key={it.name} style={{ display: "grid", gridTemplateColumns: "18px 140px 50px 1fr 36px", gap: 6, alignItems: "center" }}>
                  <span className="mono" style={{ fontSize: 10, color: "var(--ink-3)" }}>{i+1}</span>
                  <span style={{ fontSize: 11, color: "var(--ink-1)", fontWeight: 500 }}>{it.name}</span>

        {/* Budget vs Score scatter */}

          <CardHead title="Budget vs Score Scatter"
            sub="X = Budget (₹ Cr) · Y = Score · point = project · trend line in grey" />
          <div style={{ flex: 1, position: "relative", padding: "16px 8px 24px 30px" }}>

                  <g key={x}>
                    <line x1={xx} y1="0" x2={xx} y2="200" stroke="#F1F3F8" />
                    <text x={xx} y="214" textAnchor="middle" style={{ fontSize: 9, fill: "#6B7280" }}>₹{x}Cr</text>
                  </g>
                );
              })}
              {/* trend line — slope positive (higher budget → higher score roughly) */}
              {fp.length >= 2 && (() => {
                const xs = fp.map(p => p.budget), ys = fp.map(p => p.score);
                const n = xs.length;
                const mx = xs.reduce((a,b)=>a+b,0)/n;
                const my = ys.reduce((a,b)=>a+b,0)/n;
                const num = xs.reduce((s,x,i)=> s + (x-mx)*(ys[i]-my), 0);
                const den = xs.reduce((s,x)=> s + (x-mx)*(x-mx), 0);
                if (den === 0) return null;
                const slope = num/den;
                const intercept = my - slope*mx;
                const x1 = xMin, x2 = xMax;
                const y1 = slope*x1 + intercept, y2 = slope*x2 + intercept;
                const X1 = 0, X2 = 320;
                const Y1 = 200 - (y1 - yMin)/(yMax - yMin)*200;
                const Y2 = 200 - (y2 - yMin)/(yMax - yMin)*200;
                return <line x1={X1} y1={Y1} x2={X2} y2={Y2} stroke="#9CA3AF" strokeWidth="1.4" strokeDasharray="5 4" />;
              })()}
              {/* points */}
              {fp.map(p => {
                const c = bandColor(p.score);
                const X = (p.budget - xMin)/(xMax - xMin) * 320;
                const Y = 200 - (p.score - yMin)/(yMax - yMin) * 200;
                return (
                  <g key={p.code}>
                    <circle cx={X} cy={Y} r="8" fill={c.fill} stroke={c.text} strokeWidth="1.6" />
                    <text x={X} y={Y+2.5} textAnchor="middle" style={{ fontSize: 8, fontWeight: 700, fill: c.text }}>{p.code.slice(1)}</text>
                  </g>
                );
              })}
              {/* axis labels */}
              <text x="160" y="232" textAnchor="middle" style={{ fontSize: 9.5, fill: "var(--ink-3)", fontWeight: 600 }}>Budget (₹ Cr) →</text>
              <text x="-18" y="100" textAnchor="middle" transform="rotate(-90 -18 100)" style={{ fontSize: 9.5, fill: "var(--ink-3)", fontWeight: 600 }}>Score →</text>
            </svg>
          </div>
        </div>
      </div>
    </>
  );
}

function Tab5() {
  const [sub, setSub] = useState("A");
  return (
    <div className="content-inner">
      <SubTabs active={sub} onChange={setSub} />
      <div style={{ flex: 1, minHeight: 0, display: "flex", flexDirection: "column", gap: 10 }}>
        {sub === "A" && <Tab5A />}
        {sub === "B" && <Tab5B />}
        {sub === "C" && <Tab5C />}
      </div>
    </div>
  );
}

/* ============================================================
   APP
   ============================================================ */

function App() {
  const [tab, setTab] = useState(1);
  return (
    <FilterProvider>
      <div style={{ width: "100%", height: "100%", position: "relative" }} data-screen-label={`Tab ${tab}`}>
        <div className="body-row">
          <VNav active={tab} onChange={setTab} />
          <div className="main-col">
            <Header active={tab} />
            <FilterBar />
            <div className="content">
              {tab === 1 && <Tab1 />}
              {tab === 2 && <Tab2 />}
              {tab === 3 && <Tab3 />}
              {tab === 4 && <Tab4 />}
              {tab === 5 && <Tab5 />}
            </div>
            <Footer tab={tab} />
          </div>
        </div>
      </div>
    </FilterProvider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
